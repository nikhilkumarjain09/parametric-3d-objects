name: Vercel Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Quality Checks & Local Build
        run: npm run build

      - name: Install Vercel CLI
        if: secrets.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Info (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment Info (Preview)
        if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')) && secrets.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != ''
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts (Preview)
        if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')) && secrets.VERCEL_TOKEN != ''
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != ''
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel (Preview)
        if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')) && secrets.VERCEL_TOKEN != ''
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
